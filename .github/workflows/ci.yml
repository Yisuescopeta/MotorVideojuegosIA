name: CI

on:
  push:
  pull_request:

jobs:
  tests:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade "pip>=25.3" "setuptools>=78.1.1" "wheel>=0.46"
          python -m pip install -e .[dev]

      - name: Run unittest suite
        run: python -m unittest discover -s tests

  lint:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade "pip>=25.3" "setuptools>=78.1.1" "wheel>=0.46"
          python -m pip install -e .[dev]

      - name: Ruff
        run: python -m ruff check engine/api engine/project engine/rl engine/serialization engine/events cli tools main.py

  types:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade "pip>=25.3" "setuptools>=78.1.1" "wheel>=0.46"
          python -m pip install -e .[dev]

      - name: Mypy
        run: python -m mypy engine/api engine/project engine/rl engine/serialization engine/events cli tools main.py

  security:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install project
        run: |
          python -m pip install --upgrade "pip>=25.3" "setuptools>=78.1.1" "wheel>=0.46"
          python -m pip install -e .[dev]

      - name: Bandit
        run: python -m bandit -q -c .bandit -r engine cli tools main.py

      - name: pip-audit
        run: |
          # Pygments sigue reportando CVE-2026-4539 en pip-audit sin fix publicado.
          python -m pip_audit --skip-editable --ignore-vuln CVE-2026-4539
